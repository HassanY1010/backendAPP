services:
  - type: web
    name: haraj-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: APP_NAME
        value: "Laqta App"
      - key: APP_ENV
        value: production
      - key: APP_KEY
        sync: false
      - key: APP_URL
        value: https://backendapp-jycu.onrender.com
      - key: APP_DEBUG
        value: "false"
      - key: APP_TIMEZONE
        value: UTC
      - key: LOG_LEVEL
        value: error
      # Database (Aiven MySQL) — set secrets manually in Render dashboard
      - key: DB_CONNECTION
        value: mysql
      - key: DB_HOST
        value: mysql-3631c3c9-skjeb13-7647.g.aivencloud.com
      - key: DB_PORT
        value: "15813"
      - key: DB_DATABASE
        value: defaultdb
      - key: DB_USERNAME
        value: avnadmin
      - key: DB_PASSWORD
        sync: false
      - key: MYSQL_ATTR_SSL_CA
        value: /etc/ssl/certs/aiven-ca.crt
      # Cache / Queue / Session
      - key: QUEUE_CONNECTION
        value: sync
      - key: CACHE_DRIVER
        value: file
      - key: SESSION_DRIVER
        value: file
      - key: SESSION_LIFETIME
        value: "120"
      - key: FILESYSTEM_DISK
        value: supabase
      # Supabase Storage — set secrets manually in Render dashboard
      - key: SUPABASE_URL
        value: https://seilhifvqmfusegrpeqd.supabase.co
      - key: SUPABASE_STORAGE_KEY
        value: seilhifvqmfusegrpeqd
      - key: SUPABASE_STORAGE_SECRET
        sync: false
      - key: SUPABASE_STORAGE_ENDPOINT
        value: https://seilhifvqmfusegrpeqd.supabase.co/storage/v1/s3
      - key: SUPABASE_STORAGE_BUCKET
        value: uploads
      # Pusher
      - key: BROADCAST_DRIVER
        value: pusher
      - key: PUSHER_APP_ID
        value: "2088706"
      - key: PUSHER_APP_KEY
        value: e4d91eea6f30eee94550
      - key: PUSHER_APP_SECRET
        sync: false
      - key: PUSHER_APP_CLUSTER
        value: ap2
      # SMS
      - key: SMS_GATEWAY_URL
        value: https://sms.alawaeltec.com/MainServlet
      - key: SMS_ORG_NAME
        value: LaqtaApp
      - key: SMS_USER_NAME
        value: LaqtaApp
      - key: SMS_PASSWORD
        sync: false
      # CORS
      - key: FRONTEND_URL
        value: https://app-silk-iota-97.vercel.app,http://localhost:5173
      - key: ADMIN_TOKEN_TTL_HOURS
        value: "8"
      # Admin Credentials (enter values manually in Render dashboard)
      - key: ADMIN_PHONE
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
